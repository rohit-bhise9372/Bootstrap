<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Movie Details</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </head>

  <body>
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
      <div class="container">
        <a class="navbar-brand" href="index.html">Movie Database</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="movies.html">Movies</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="report.html">Report</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- movie Details Section -->
    <section id="movie-details" class="container">
      <h1>Movie Details</h1>
      <div id="card-container"></div>
    </section>

    <script>
      function getParameterByName(name) {
        const url = new URL(window.location.href);
        return url.searchParams.get(name);
      }

      const movieId = getParameterByName("id");

      const movies = [
        {
          id: 1,
          name: "Movie 1",
          genre: "Action",
          details: "This is an action-packed movie.",
        },
        {
          id: 2,
          name: "Movie 2",
          genre: "Drama",
          details: "A dramatic story unfolds in this movie",
        },
        {
          id: 3,
          name: "Movie 3",
          genre: "Comedy",
          details: "This is an comedy movie.",
        },
      ];

      const movie = movies.find((p) => p.id === parseInt(movieId));
      const container = document.getElementById("card-container");

      if (movie) {
        const cardHTML = `

          <div class = "mt-2">
            <div class = "card">
          <div class = "card-body">
            <h5><span class="fw-bold card-title">Movie:</span> ${movie.id}</h5>
            <p><span class="fw-bold">Genre:</span> ${movie.genre}</p>
            <p><span class="fw-bold">Details:</span> ${movie.details}</p>
          </div>
          </div>
          </div>

      `;
        container.innerHTML = `
       <div class="row">
        ${cardHTML}
        </div>
        `;
      } else {
        container.innerHTML = "<div>movie not found.</div>";
      }
    </script>
  </body>
</html>
