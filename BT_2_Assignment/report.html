<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Movie Report</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body>
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
      <div class="container">
        <a class="navbar-brand" href="index.html">Movie Database</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="movies.html">Movies</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="report.html">Report</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <section class="container mt-4">
      <h1 class="mb-3">Movie Report</h1>

      <div id="movie-report"></div>
    </section>

    <script>
      function generateMovieReport() {
        const topRatedMovie = {
          title: "Movie 2",
          rating: 9.2,
          director: "Jane Smith",
        };

        const mostPopularGenre = {
          genre: "Action",
          totalMovies: 3,
        };

        const reportContainer = document.getElementById("movie-report");

        const topRatedMovieCard = `
          <div class="col-md-6">
            <div class="card mb-3">
              <div class="card-header">
                <h2>Top-Rated Movie</h2>
              </div>

              <div class="card-body">
                <p>
                  <span class="fw-bold">title:</span>
                  ${topRatedMovie.title}
                </p>

                <p>
                  <span class="fw-bold">rating:</span>
                  ${topRatedMovie.rating}
                </p>

                <p>
                  <span class="fw-bold">director:</span>
                  ${topRatedMovie.director}
                </p>
              </div>
            </div>
          </div>
        `;

        const popularGenreCard = `
          <div class="col-md-6">
            <div class="card mb-3">
              <div class="card-header">
                <h2>Most Popular Genre</h2>
              </div>

              <div class="card-body">
                <p>
                  <span class="fw-bold">genre:</span>
                  ${mostPopularGenre.genre}
                </p>

                <p>
                  <span class="fw-bold">totalMovies:</span>
                  ${mostPopularGenre.totalMovies}
                </p>
              </div>
            </div>
          </div>
        `;

        reportContainer.innerHTML = `
          <div class="row">
            ${topRatedMovieCard}
            ${popularGenreCard}
          </div>
        `;
      }

      generateMovieReport();
    </script>
  </body>
</html>
